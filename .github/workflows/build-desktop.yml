name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: "*.dmg"
          - os: windows-latest
            platform: win
            artifact: "*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Sync web-dist to desktop
        shell: bash
        run: |
          rm -rf apps/desktop/web-dist
          cp -r apps/web/dist apps/desktop/web-dist

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build desktop (${{ matrix.platform }})
        working-directory: apps/desktop
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: apps/desktop/release/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: coco-desktop-${{ matrix.platform }}
          path: apps/desktop/release/${{ matrix.artifact }}
